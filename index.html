<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spovicfy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #111; background: #f0faf4; }

/* SCREENS */
.screen { display: none; width: 100%; height: 100vh; height: 100dvh; }
.screen.active { display: flex; }

/* IDLE SCREEN */
#screen-idle {
  flex-direction: column;
  align-items: center;
  padding: 1.5rem;
  gap: 0.8rem;
  background: #f0faf4;
  overflow: hidden;
}
.logo-bar {
  width: 100%;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 2rem;
  border-radius: 16px;
  flex-shrink: 0;
}
.site-logo { height: clamp(45px, 7vw, 80px); width: auto; object-fit: contain; flex-shrink: 0; }
.tagline { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #666; text-align: center; flex-shrink: 0; }

/* TWO COLUMN GRID */
.home-grid {
  width: 100%;
  max-width: 1200px;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: row;
  gap: 1.5rem;
  align-items: flex-start;
}
.home-left {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 0.5rem;
}
.home-label { font-size: 1rem; font-weight: 800; color: #111; }
.home-left input {
  width: 100%; padding: 0.9rem 1rem; border-radius: 14px;
  background: #fff; border: 2px solid #c8efd8; color: #111;
  font-size: 1rem; outline: none; -webkit-appearance: none;
}
.home-left input:focus { border-color: #1DB954; }
.home-left input::placeholder { color: #bbb; }
.home-left input::placeholder { color: #bbb; }
#btn-manual {
  width: 100%; padding: 0.9rem; border-radius: 14px;
  background: #1DB954; border: none; color: #fff;
  font-size: 1rem; font-weight: 700; cursor: pointer; -webkit-appearance: none;
}
#btn-manual:active { background: #17a344; }
#btn-random {
  width: 100%; padding: 0.9rem; border-radius: 50px;
  background: rgba(29,185,84,0.1); border: 2px solid rgba(29,185,84,0.4);
  color: #17a344; font-size: 1rem; font-weight: 700; cursor: pointer; -webkit-appearance: none;
}
#btn-start {
  width: 100%; padding: 0.9rem; border-radius: 50px;
  background: rgba(25,20,20,0.07); border: 2px solid rgba(25,20,20,0.2);
  color: #191414; font-size: 1rem; font-weight: 700; cursor: pointer; -webkit-appearance: none;
}
#btn-english {
  width: 100%; padding: 0.9rem; border-radius: 50px;
  background: rgba(37,99,235,0.1); border: 2px solid rgba(37,99,235,0.35);
  color: #2563eb; font-size: 1rem; font-weight: 700; cursor: pointer; -webkit-appearance: none;
}
#btn-english:active { opacity: 0.75; }
.btn-separator {
  width: 100%;
  height: 1px;
  background: rgba(29,185,84,0.2);
  margin: 0.5rem 0;
}
#btn-random:active, #btn-start:active { opacity: 0.75; }

/* REPERTOIRE PANEL */
.home-right {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 20px;
  border: 1.5px solid #c8efd8;
  overflow: hidden;
  height: calc(100vh - 180px);
  height: calc(100dvh - 180px);
}
.rep-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.8rem 1.2rem; border-bottom: 1px solid #e8f8f0; flex-shrink: 0;
}
.rep-title { font-size: 1rem; font-weight: 800; color: #191414; }
#rep-filter {
  padding: 0.45rem 0.9rem; border-radius: 50px;
  background: #fff; border: 1.5px solid #c8efd8; color: #111; font-size: 0.85rem; outline: none; width: 150px;
}
#rep-filter:focus { border-color: #1DB954; }
#rep-list {
  overflow-y: auto; flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  align-content: start;
}
.rep-item {
  padding: 0.6rem 0.9rem; cursor: pointer;
  border-bottom: 1px solid #f0faf4; border-right: 1px solid #f0faf4;
}
.rep-item:hover { background: #f0faf4; }
.rep-item:active { background: #d4f5e3; }
.rep-item-title { font-weight: 700; font-size: 0.8rem; color: #111; line-height: 1.3; }
.rep-item-artist { font-size: 0.7rem; color: #888; margin-top: 1px; }

#results-list {
  width: 100%; max-height: 180px; overflow-y: auto;
  background: #fff; border: 1.5px solid #c8efd8; border-radius: 14px; display: none;
}
.result-item { padding: 0.7rem 1rem; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
.result-item:last-child { border-bottom: none; }
.result-item:active { background: #f0faf4; }
.result-title { font-weight: 700; font-size: 0.9rem; color: #111; }
.result-artist { font-size: 0.75rem; color: #888; margin-top: 2px; }

.msg { font-size: 0.85rem; color: #e53e3e; text-align: center; min-height: 1em; line-height: 1.5; max-width: 380px; }
.msg.info { color: #1DB954; }

/* LISTENING SCREEN */
#screen-listening {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 1.5rem; background: #f0faf4;
}
.pulse-wrap { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
.pr { position: absolute; border-radius: 50%; border: 2px solid rgba(29,185,84,0.3); animation: pr 2s ease-in-out infinite; }
.pr1 { width: 140px; height: 140px; }
.pr2 { width: 105px; height: 105px; border-color: rgba(29,185,84,0.5); animation-delay: .35s; }
.pr3 { width: 74px; height: 74px; border-color: rgba(29,185,84,0.7); animation-delay: .7s; }
@keyframes pr { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.09);opacity:0.5} }
.mic-big { font-size: 3rem; z-index: 1; }
#waveform { display: flex; align-items: center; gap: 5px; height: 50px; }
.bar { width: 6px; background: #1DB954; border-radius: 3px; height: 8px; animation: wv 1s ease-in-out infinite; }
@keyframes wv { 0%,100%{height:8px} 50%{height:44px} }
.listen-lbl { font-size: 1rem; color: #555; text-align: center; line-height: 1.9; }
.listen-lbl b { color: #1DB954; font-weight: 600; }
.timer-arc { font-size: 2.5rem; font-weight: 800; color: #1DB954; }
#btn-cancel { padding: 0.7rem 2rem; border-radius: 50px; background: transparent; border: 1.5px solid #ccc; color: #888; cursor: pointer; font-size: 0.9rem; -webkit-appearance: none; }

/* FOUND SCREEN */
#screen-found {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 1.3rem; background: #f0faf4;
}
.badge-ok { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: #1DB954; padding: 0.3rem 1rem; border-radius: 50px; border: 1px solid rgba(29,185,84,0.4); background: rgba(29,185,84,0.08); }
#found-title { font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 800; text-align: center; max-width: 480px; line-height: 1.2; color: #111; }
#found-artist { font-size: 1rem; color: #666; }
.loading-lyrics { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
.spinner { width: 34px; height: 34px; border: 3px solid #eee; border-top-color: #1DB954; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 0.9rem; color: #1DB954; }
.found-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn-p { padding: 0.9rem 2.2rem; border-radius: 50px; background: #1DB954; border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
.btn-p:active { background: #17a344; }
.btn-s { padding: 0.9rem 1.8rem; border-radius: 50px; background: transparent; border: 1.5px solid #ccc; color: #666; font-size: 1rem; cursor: pointer; -webkit-appearance: none; }

/* KARAOKE SCREEN */
#screen-karaoke {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  flex-direction: column; background: #fafffe;
}
#screen-karaoke.active { display: flex; }
#k-hdr {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 10px;
  padding: 0.6rem 1rem; width: 100%; flex-shrink: 0;
  background: #000000; border-bottom: 1px solid #1a1a1a; z-index: 10;
}
.k-logo-img { height: 32px; width: auto; object-fit: contain; }
.k-song { display: flex; flex-direction: column; align-items: center; min-width: 0; }
.k-song .kt { font-size: 1rem; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; }
.k-song .ka { font-size: 0.8rem; color: #aaa; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; }
.k-btns { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.k-btns button { height: 40px; min-width: 40px; padding: 0 12px; border-radius: 20px; border: none; font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer; -webkit-appearance: none; display: flex; align-items: center; justify-content: center; }
.k-btns button:active { opacity: 0.7; transform: scale(0.95); }
#btn-play   { background: #1DB954; display: flex; }
#btn-pause  { background: #000000; display: none; }
#btn-slower { background: #d97706; }
#btn-faster { background: #2563eb; }
#btn-rst    { background: #64748b; }
#btn-exit   { background: #dc2626; }
#speed-badge { height: 40px; min-width: 44px; padding: 0 10px; border-radius: 20px; background: #f0f0f0; font-size: 0.8rem; font-weight: 800; color: #555; display: flex; align-items: center; justify-content: center; }
#lyrics-win { flex: 1; width: 100%; overflow: hidden; position: relative; touch-action: pan-y; background: #fafffe; }
#lyrics-box { position: absolute; left: 0; right: 0; top: 0; display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 0 1.5rem; will-change: transform; }
.ll { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; text-align: center; color: #111; line-height: 1.4; padding: 0.1rem 0.5rem; cursor: pointer; user-select: none; width: 100%; }
#k-ftr { padding: 0.6rem 1rem; width: 100%; flex-shrink: 0; background: rgba(255,255,255,0.95); border-top: 1px solid #e0f5e8; z-index: 10; }
#prog-track { width: 100%; height: 5px; background: #e0f5e8; border-radius: 3px; cursor: pointer; touch-action: none; }
#prog-fill { height: 100%; background: #1DB954; border-radius: 3px; width: 0%; pointer-events: none; }
.time-row { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.74rem; color: #aaa; }

/* MOBILE */
@media (max-width: 700px) {
  #screen-idle {
    padding: 1rem;
    gap: 0.6rem;
    overflow-y: auto !important;
    height: auto !important;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .home-grid { flex-direction: column; gap: 1rem; overflow: visible; }
  .home-left { width: 100%; }
  .home-right { height: 60vh; }
  #rep-list { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

function spd(){return SPEED[speedIdx];}
function updateBadge(){var s=spd();document.getElementById('speed-badge').textContent=(s===1?'1':s)+'×';}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function isSecondary(item){var t=item.trackName||'';return /live|directo|acoustic|acustic|remaster|remix|maqueta|demo/i.test(t)||/\bfeat\b|\bft\b/i.test(t);}
function score(item,qa){
  var t=item.trackName||'',a=item.artistName||'',s=0;
  if(/\(/.test(t))s+=20;if(/\[/.test(t))s+=20;
  if(/\bfeat\b|\bft\b/i.test(t))s+=15;if(/\bfeat\b|\bft\b/i.test(a))s+=15;
  if(/live|directo/i.test(t))s+=30;if(/acoustic|acustic/i.test(t))s+=25;
  if(/remaster/i.test(t))s+=20;if(/remix/i.test(t))s+=25;
  if(/radio.?edit/i.test(t))s+=20;if(/maqueta|demo/i.test(t))s+=25;
  if(/versión|version/i.test(t))s+=15;
  if(qa&&norm(a).indexOf(norm(qa))!==-1)s-=40;
  if(!item.syncedLyrics)s+=5;
  return s;
}

    var a=document.createElement('div');a.className='rep-item-artist';a.textContent=s.artist;
    div.appendChild(t);div.appendChild(a);
    div.addEventListener('click',function(){showFoundAndLoad(s.title,s.artist,null);});
    list.appendChild(div);
  });
}

  var list=document.getElementById('rep-list');
  list.innerHTML='';
  document.getElementById('rep-filter').value='';
  ENGLISH.forEach(function(s){
    var div=document.createElement('div');div.className='rep-item';
    var t=document.createElement('div');t.className='rep-item-title';t.textContent=s.title;
    var a=document.createElement('div');a.className='rep-item-artist';a.textContent=s.artist;
    div.appendChild(t);div.appendChild(a);
    div.addEventListener('click',function(){showFoundAndLoad(s.title,s.artist,null);});
    list.appendChild(div);
  });
  document.querySelector('.rep-title').textContent='🇬🇧 En inglés';
});
// Also make Repertorio button restore full list
document.getElementById('rep-filter').addEventListener('focus', function(){
  document.querySelector('.rep-title').textContent='🎵 Repertorio';
  renderRepList('');
});

function seekFromEvent(e){if(!lyrics.length)return;var r=document.getElementById('prog-track').getBoundingClientRect();seekK(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*totalMs());}
function setPaused(p){paused=p;document.getElementById('btn-play').style.display=p?'flex':'none';document.getElementById('btn-pause').style.display=p?'none':'flex';}

function startListen(){
  setMsg('idle-msg','');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setMsg('idle-msg','⚠️ Usa Safari (iOS) o Chrome (Android).');return;}
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
    .then(function(stream){
      chunks=[];var opts={};
      if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))opts.mimeType='audio/webm;codecs=opus';
      else if(MediaRecorder.isTypeSupported('audio/webm'))opts.mimeType='audio/webm';
      else if(MediaRecorder.isTypeSupported('audio/mp4'))opts.mimeType='audio/mp4';
      mediaRec=new MediaRecorder(stream,opts);
      mediaRec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
      mediaRec.start(500);show('listening');
      startCountdown(8,function(){recognizeAudio(stream);});
    })
    .catch(function(err){setMsg('idle-msg',err.name==='NotAllowedError'?'⚠️ Permiso denegado.':'⚠️ No se pudo acceder al micrófono.');});
}
function startCountdown(secs,cb){var r=secs;document.getElementById('listen-countdown').textContent=r;cntTmr=setInterval(function(){r--;document.getElementById('listen-countdown').textContent=r;if(r<=0){clearInterval(cntTmr);cb();}},1000);}
function cancelListen(){clearInterval(cntTmr);try{if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();}catch(e){}try{if(mediaRec&&mediaRec.stream)mediaRec.stream.getTracks().forEach(function(t){t.stop();});}catch(e){}}
function recognizeAudio(stream){
  try{if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();}catch(e){}
  stream.getTracks().forEach(function(t){t.stop();});
  setMsg('listen-msg','Identificando canción…','info');
  var mimeType=(mediaRec&&mediaRec.mimeType)?mediaRec.mimeType:'audio/webm';
  var blob=new Blob(chunks,{type:mimeType});
  if(blob.size<1000){setMsg('listen-msg','⚠️ No se captó audio.');setTimeout(function(){show('idle');},3000);return;}
  var form=new FormData();
  form.append('file',blob,'rec.'+(mimeType.includes('mp4')?'m4a':'webm'));
  form.append('return','spotify,apple_music');form.append('api_token','test');
  fetch('https://api.audd.io/',{method:'POST',body:form})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.status==='success'&&data.result){song={title:data.result.title,artist:data.result.artist};showFoundAndLoad(song.title,song.artist,null);}
      else{setMsg('listen-msg','No reconocida. Busca manualmente.','msg');setTimeout(function(){show('idle');},3000);}
    })
    .catch(function(){setMsg('listen-msg','⚠️ Error de red.','msg');setTimeout(function(){show('idle');},3000);});
}

function manualSearch(){
  var val=document.getElementById('manual-input').value.trim();
  if(!val){setMsg('idle-msg','Escribe algo para buscar.');return;}
  setMsg('idle-msg','Buscando…','info');
  document.getElementById('results-list').style.display='none';
  document.getElementById('results-list').innerHTML='';
  searchLrclib(val).then(function(found){
    if(!found){
      setMsg('idle-msg','Buscando por letra…','info');
      var apiUrl='https://api.genius.com/search?q='+encodeURIComponent(val)+'&per_page=8';
      var proxy='https://corsproxy.io/?'+encodeURIComponent(apiUrl);
      fetch(proxy)
        .then(function(r){return r.ok?r.json():null;})
        .then(function(data){
          if(!data||!data.response||!data.response.hits||!data.response.hits.length){setMsg('idle-msg','No encontrado. Prueba con el título.');return;}
          var hits=data.response.hits.filter(function(h){return h.type==='song';}).slice(0,6);
          if(!hits.length){setMsg('idle-msg','No encontrado.');return;}
          if(hits.length===1){setMsg('idle-msg','');showFoundAndLoad(hits[0].result.title,hits[0].result.primary_artist.name,null);}
          else{
            setMsg('idle-msg','Elige la canción:','info');
            var list=document.getElementById('results-list');list.innerHTML='';
            hits.forEach(function(h){
              var item=h.result;
              var div=document.createElement('div');div.className='result-item';
              var t=document.createElement('div');t.className='result-title';t.textContent=item.title;
              var a=document.createElement('div');a.className='result-artist';a.textContent=item.primary_artist.name;
              div.appendChild(t);div.appendChild(a);
              div.addEventListener('click',function(){list.style.display='none';setMsg('idle-msg','');showFoundAndLoad(item.title,item.primary_artist.name,null);});
              list.appendChild(div);
            });
            list.style.display='block';
          }
        })
        .catch(function(){setMsg('idle-msg','No encontrado. Prueba con el título exacto.');});
    }
  });
}

function searchLrclib(val){
  var parts=val.split(/\s*[·\-]\s*/);var qa=parts.length>1?parts[parts.length-1]:'';
  return fetch('https://lrclib.net/api/search?q='+encodeURIComponent(val),{headers:{'Lrclib-Client':'KaraokeApp/1.0'}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(arr){
      if(!arr||arr.length===0)return false;
      var normVal=norm(val);
      var artistMatches=arr.filter(function(item){return norm(item.artistName||'').indexOf(normVal)!==-1;});
      if(artistMatches.length>=arr.length*0.4){
        var seen={};var ded=[];
        arr.forEach(function(item){var k=norm(item.trackName||'');if(!seen[k]&&!isSecondary(item)){seen[k]=true;ded.push(item);}});
        if(ded.length<3)arr.forEach(function(item){var k=norm(item.trackName||'');if(!seen[k]){seen[k]=true;ded.push(item);}});
        showList(ded.slice(0,8));return true;
      }
      arr.sort(function(a,b){return score(a,qa)-score(b,qa);});
      var best=arr[0],second=arr[1];
      var diff=second?(score(second,qa)-score(best,qa)):999;
      if(diff<8&&second&&norm(best.trackName||'')===norm(second.trackName||'')&&norm(best.artistName||'')!==norm(second.artistName||'')){showList(arr.slice(0,5));}
      else{selectResult(best);}
      return true;
    }).catch(function(){return false;});
}

function showList(arr){
  var seen={},ded=[];
  arr.forEach(function(item){var k=norm(item.trackName||'')+'||'+norm(item.artistName||'');if(!seen[k]){seen[k]=true;ded.push(item);}});
  if(ded.length===1){selectResult(ded[0]);return;}
  setMsg('idle-msg','Elige la canción:','info');
  var list=document.getElementById('results-list');list.innerHTML='';
  ded.forEach(function(item){
    var div=document.createElement('div');div.className='result-item';
    var t=document.createElement('div');t.className='result-title';t.textContent=item.trackName||'—';
    var a=document.createElement('div');a.className='result-artist';a.textContent=item.artistName||'';
    div.appendChild(t);div.appendChild(a);
    div.addEventListener('click',function(){selectResult(item);list.style.display='none';setMsg('idle-msg','');});
    list.appendChild(div);
  });
  list.style.display='block';
}
function selectResult(item){song={title:item.trackName||'Desconocido',artist:item.artistName||''};document.getElementById('results-list').style.display='none';setMsg('idle-msg','');showFoundAndLoad(song.title,song.artist,item.id);}
function showFoundAndLoad(title,artist,lrcId){
  song={title:title,artist:artist||''};
  document.getElementById('found-title').textContent=title;
  document.getElementById('found-artist').textContent=artist||'';
  document.getElementById('loading-lyrics').style.display='flex';
  document.getElementById('found-btns').style.display='none';
  setMsg('found-msg','');show('found');
  fetchLyrics(lrcId).then(function(result){
    document.getElementById('loading-lyrics').style.display='none';
    if(!result||result.length===0){setMsg('found-msg','⚠️ No se encontró letra.');document.getElementById('found-btns').style.display='flex';return;}
    lyrics=result;beginKaraoke();
  }).catch(function(){document.getElementById('loading-lyrics').style.display='none';setMsg('found-msg','⚠️ Error de red.');document.getElementById('found-btns').style.display='flex';});
}
function fetchLyrics(lrcId){
  if(lrcId&&typeof lrcId==='number'){
    return fetch('https://lrclib.net/api/get/'+lrcId,{headers:{'Lrclib-Client':'KaraokeApp/1.0'}})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(d){if(d&&d.syncedLyrics)return parseLRC(d.syncedLyrics);if(d&&d.plainLyrics)return buildPlain(d.plainLyrics);return searchLrclibLyrics();});
  }
  return searchLrclibLyrics();
}
function searchLrclibLyrics(){
  var q=encodeURIComponent(song.title+(song.artist?' '+song.artist:''));
  return fetch('https://lrclib.net/api/search?q='+q,{headers:{'Lrclib-Client':'KaraokeApp/1.0'}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(arr){
      if(!arr||!arr.length)return null;
      arr.sort(function(a,b){return score(a,song.artist)-score(b,song.artist);});
      for(var i=0;i<arr.length;i++){if(arr[i].syncedLyrics)return parseLRC(arr[i].syncedLyrics);}
      for(var j=0;j<arr.length;j++){if(arr[j].plainLyrics)return buildPlain(arr[j].plainLyrics);}
      return null;
    });
}
function parseLRC(lrc){var r=[];lrc.split('\n').forEach(function(line){var m=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);if(m){var ms=(parseInt(m[1])*60+parseFloat(m[2]))*1000;var t=m[3].trim();if(t)r.push({time:ms,text:t});}});return r;}
function buildPlain(plain){var lines=plain.split('\n').filter(function(l){return l.trim();});var dur=lines.length*3600;return lines.map(function(text,i){return{time:i*(dur/lines.length),text:text};});}

function beginKaraoke(){
  if(!lyrics.length)return;
  document.getElementById('k-title').textContent=song.title;
  document.getElementById('k-artist').textContent=song.artist||'';
  speedIdx=3;updateBadge();
  buildDOM();show('karaoke');
  currentY=0;targetY=0;manualOffset=0;userScrolling=false;applyY(0);
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    lineOffsets=[];document.querySelectorAll('.ll').forEach(function(el){lineOffsets.push(el.offsetTop);});
    kStart=performance.now();pausedAt=0;setPaused(false);
    stopTimer();kTimer=setInterval(tick,80);
  });});
}
function buildDOM(){
  var c=document.getElementById('lyrics-box');c.innerHTML='';
  lyrics.forEach(function(line){
    var el=document.createElement('div');el.className='ll';el.textContent=line.text;
    var t=line.time;el.addEventListener('click',function(){userScrolling=false;manualOffset=0;seekK(t);});
    c.appendChild(el);
  });
  var pb=document.createElement('div');pb.style.height='50vh';c.appendChild(pb);
}
function tick(){if(paused)return;updateAt(performance.now()-kStart);}
function updateAt(ms){
  var ems=ms*spd();
  var lines=document.querySelectorAll('.ll');if(!lines.length)return;
  var active=-1;
  for(var i=lyrics.length-1;i>=0;i--){if(ems>=lyrics[i].time){active=i;break;}}
  lines.forEach(function(el,i){el.classList.remove('active','past','next');if(i<active)el.classList.add('past');else if(i===active)el.classList.add('active');else if(i===active+1)el.classList.add('next');});
  if(!userScrolling){
    var win=document.getElementById('lyrics-win'),winH=win.clientHeight;
    if(active<0){targetY=0;}
    else{var lt=lineOffsets[active]!==undefined?lineOffsets[active]:lines[active].offsetTop;targetY=-(lt-winH/2+lines[active].offsetHeight/2);if(targetY>0)targetY=0;}
    currentY+=(targetY-currentY)*0.15;applyY(currentY);
  }
  var total=totalMs();
  document.getElementById('prog-fill').style.width=Math.min(100,(ems/total)*100)+'%';
  document.getElementById('t-cur').textContent=fmt(ems);
  document.getElementById('t-tot').textContent=fmt(total);
}
function totalMs(){return lyrics.length?lyrics[lyrics.length-1].time+5000:1;}
function fmt(ms){var s=Math.floor(Math.max(0,ms)/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function stopTimer(){if(kTimer){clearInterval(kTimer);kTimer=null;}}
function restartK(){userScrolling=false;manualOffset=0;currentY=0;targetY=0;applyY(0);speedIdx=3;updateBadge();kStart=performance.now();pausedAt=0;setPaused(false);updateAt(0);}
function seekK(ms){var raw=ms/spd();kStart=performance.now()-raw;pausedAt=raw;updateAt(raw);}
</script>

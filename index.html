<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Karaoke 🎤</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; overflow: hidden; }
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; min-height: 100dvh; padding: 2rem 1.5rem; gap: 1.4rem; }
.screen.active { display: flex; }
#screen-idle { background: #f5f5f7; }
.logo { font-size: clamp(2.8rem, 10vw, 5rem); font-weight: 800; letter-spacing: -3px; color: #111; }
.logo span { color: #7c3aed; }
.tagline { font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; color: #888; text-align: center; }
#btn-start { width: 100%; max-width: 380px; padding: 1.15rem 2rem; border-radius: 50px; background: #7c3aed; border: none; color: #fff; font-size: 1.15rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
#btn-start:active { background: #6d28d9; }
.or-line { color: #bbb; font-size: 0.85rem; }
.search-box { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 8px; }
.search-box input { width: 100%; padding: 0.9rem 1rem; border-radius: 14px; background: #fff; border: 1.5px solid #ddd; color: #111; font-size: 1rem; outline: none; -webkit-appearance: none; }
.search-box input::placeholder { color: #bbb; }
.search-box input:focus { border-color: #7c3aed; }
.search-hint { font-size: 0.75rem; color: #999; text-align: center; line-height: 1.5; }
.search-box button { width: 100%; padding: 0.9rem 1.2rem; border-radius: 14px; background: #111; border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
.search-box button:active { background: #333; }
.msg { font-size: 0.88rem; color: #e53e3e; text-align: center; min-height: 1.1em; line-height: 1.5; max-width: 340px; }
.msg.ok { color: #38a169; }
.msg.info { color: #7c3aed; }
#results-list { width: 100%; max-height: 220px; overflow-y: auto; background: #fff; border: 1.5px solid #ddd; border-radius: 14px; display: none; }
.result-item { padding: 0.8rem 1rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
.result-item:last-child { border-bottom: none; }
.result-item:active { background: #f5f5f7; }
.result-title { font-weight: 600; font-size: 0.95rem; color: #111; }
.result-artist { font-size: 0.8rem; color: #888; margin-top: 2px; }
#screen-listening { background: #f5f5f7; }
.pulse-wrap { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pr { position: absolute; border-radius: 50%; border: 2px solid rgba(124,58,237,0.3); animation: pr 2s ease-in-out infinite; }
.pr1 { width: 150px; height: 150px; }
.pr2 { width: 115px; height: 115px; border-color: rgba(124,58,237,0.5); animation-delay: .35s; }
.pr3 { width: 82px; height: 82px; border-color: rgba(124,58,237,0.7); animation-delay: .7s; }
@keyframes pr { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.09);opacity:0.5} }
.mic-big { font-size: 3rem; z-index: 1; }
#waveform { display: flex; align-items: center; gap: 5px; height: 52px; }
.bar { width: 6px; background: #7c3aed; border-radius: 3px; height: 8px; animation: wv 1s ease-in-out infinite; }
@keyframes wv { 0%,100%{height:8px} 50%{height:46px} }
.listen-lbl { font-size: 1.1rem; color: #555; text-align: center; line-height: 1.9; }
.listen-lbl b { color: #7c3aed; font-weight: 600; }
.timer-arc { font-size: 2.5rem; font-weight: 800; color: #7c3aed; }
#btn-cancel { padding: 0.7rem 2.2rem; border-radius: 50px; background: transparent; border: 1.5px solid #ccc; color: #888; cursor: pointer; font-size: 0.95rem; -webkit-appearance: none; }
#screen-found { background: #f5f5f7; }
.badge-ok { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: #7c3aed; padding: 0.3rem 1.1rem; border-radius: 50px; border: 1px solid rgba(124,58,237,0.3); background: rgba(124,58,237,0.08); }
#found-title { font-size: clamp(1.7rem, 6vw, 2.6rem); font-weight: 700; text-align: center; max-width: 480px; line-height: 1.2; color: #111; }
#found-artist { font-size: 1.1rem; color: #666; }
.loading-lyrics { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
.spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 0.9rem; color: #7c3aed; }
.found-btns { display: flex; gap: 12px; margin-top: 0.4rem; flex-wrap: wrap; justify-content: center; }
.btn-p { padding: 0.95rem 2.4rem; border-radius: 50px; background: #7c3aed; border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
.btn-p:active { background: #6d28d9; }
.btn-s { padding: 0.95rem 2rem; border-radius: 50px; background: transparent; border: 1.5px solid #ccc; color: #555; font-size: 1rem; cursor: pointer; -webkit-appearance: none; }
.btn-s:active { background: #eee; }
#screen-karaoke { justify-content: flex-start; padding: 0; gap: 0; min-height: 100vh; min-height: 100dvh; background: #fff; }
#k-hdr { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.2rem; width: 100%; flex-shrink: 0; border-bottom: 1.5px solid #eee; background: #fff; }
.k-info { min-width: 0; flex: 1; padding-right: 12px; }
.k-info .kt { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #111; }
.k-info .ka { font-size: 0.78rem; color: #888; margin-top: 2px; }
.k-btns { display: flex; gap: 10px; flex-shrink: 0; }
.k-btns button { width: 56px; height: 56px; border-radius: 50%; background: #f0f0f0; border: none; color: #111; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; }
.k-btns button:active { background: #ddd; }
.k-btns #btn-exit { background: #fee2e2; color: #dc2626; }
#lyrics-win { flex: 1; width: 100%; background: #fff; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.5rem 1.5rem; scroll-behavior: smooth; }
#lyrics-box { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; max-width: 860px; margin: 0 auto; padding-bottom: 40vh; }
.ll { font-size: clamp(1.6rem, 4.5vw, 2.4rem); font-weight: 600; text-align: center; color: #111; line-height: 1.3; padding: 0.1rem 0.5rem; cursor: pointer; user-select: none; width: 100%; opacity: 0.22; transition: opacity 0.35s; }
.ll.past { opacity: 0.22; }
.ll.next { opacity: 0.55; }
.ll.active { opacity: 1; }
#k-ftr { padding: 0.9rem 1.2rem; width: 100%; flex-shrink: 0; border-top: 1.5px solid #eee; background: #fff; }
#prog-track { width: 100%; height: 6px; background: #eee; border-radius: 3px; cursor: pointer; touch-action: none; }
#prog-fill { height: 100%; background: #7c3aed; border-radius: 3px; width: 0%; pointer-events: none; transition: width 0.2s linear; }
.time-row { display: flex; justify-content: space-between; margin-top: 7px; font-size: 0.76rem; color: #aaa; }
</style>
</head>
<body>

<div id="screen-idle" class="screen active">
  <div class="logo">kara<span>ok</span>e</div>
  <div class="tagline">canta con tus amigos</div>
  <button id="btn-start">🎤 Escuchar la canción</button>
  <div class="or-line">— o busca por título o artista —</div>
  <div class="search-box">
    <input id="manual-input" type="text" placeholder='ej: "Corazón partío" o "Alejandro Sanz"' autocomplete="off" autocorrect="off" spellcheck="false" />
    <div class="search-hint">Escribe el título o el artista</div>
    <div id="results-list"></div>
    <button id="btn-manual">🔍 Buscar</button>
  </div>
  <p id="idle-msg" class="msg"></p>
</div>

<div id="screen-listening" class="screen">
  <div class="pulse-wrap">
    <div class="pr pr1"></div><div class="pr pr2"></div><div class="pr pr3"></div>
    <span class="mic-big">🎙️</span>
  </div>
  <div id="waveform"></div>
  <div class="timer-arc" id="listen-countdown">8</div>
  <div class="listen-lbl">Escuchando…<br><b>Acerca el móvil a la música</b></div>
  <button id="btn-cancel">Cancelar</button>
  <p id="listen-msg" class="msg info"></p>
</div>

<div id="screen-found" class="screen">
  <div class="badge-ok">Canción encontrada ✓</div>
  <div id="found-title">—</div>
  <div id="found-artist">—</div>
  <div class="loading-lyrics" id="loading-lyrics">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando letra…</div>
  </div>
  <div class="found-btns" id="found-btns" style="display:none">
    <button class="btn-p" id="btn-go">▶ Iniciar karaoke</button>
    <button class="btn-s" id="btn-back">Buscar otra</button>
  </div>
  <p id="found-msg" class="msg"></p>
</div>

<div id="screen-karaoke" class="screen">
  <div id="k-hdr">
    <div class="k-info">
      <div class="kt" id="k-title">—</div>
      <div class="ka" id="k-artist"></div>
    </div>
    <div class="k-btns">
      <button id="btn-pp">⏸</button>
      <button id="btn-rst">↩</button>
      <button id="btn-exit">✕</button>
    </div>
  </div>
  <div id="lyrics-win"><div id="lyrics-box"></div></div>
  <div id="k-ftr">
    <div id="prog-track"><div id="prog-fill"></div></div>
    <div class="time-row"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
  </div>
</div>

<script>
'use strict';
var song=null,lyrics=[],kTimer=null,kStart=0,paused=false,pausedAt=0;
var mediaRec=null,chunks=[],cntTmr=null,selectedLrcId=null;
var autoScrollEnabled=true;

function show(n){['idle','listening','found','karaoke'].forEach(function(id){document.getElementById('screen-'+id).classList.toggle('active',id===n);});}
function setMsg(id,text,cls){var el=document.getElementById(id);if(!el)return;el.textContent=text;el.className='msg'+(cls?' '+cls:'');}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

(function(){var wf=document.getElementById('waveform');for(var i=0;i<22;i++){var b=document.createElement('div');b.className='bar';b.style.animationDelay=(i*0.05)+'s';wf.appendChild(b);}})();

document.getElementById('lyrics-win').addEventListener('touchstart',function(){
  autoScrollEnabled=false;
  clearTimeout(window._scrollResume);
  window._scrollResume=setTimeout(function(){autoScrollEnabled=true;},4000);
},{passive:true});

document.getElementById('btn-start').addEventListener('click',startListen);
document.getElementById('btn-cancel').addEventListener('click',function(){cancelListen();show('idle');});
document.getElementById('btn-manual').addEventListener('click',manualSearch);
document.getElementById('manual-input').addEventListener('keydown',function(e){if(e.key==='Enter'){e.target.blur();manualSearch();}});
document.getElementById('manual-input').addEventListener('input',function(){selectedLrcId=null;var r=document.getElementById('results-list');r.style.display='none';r.innerHTML='';});
document.getElementById('btn-back').addEventListener('click',function(){show('idle');});
document.getElementById('btn-go').addEventListener('click',beginKaraoke);
document.getElementById('btn-pp').addEventListener('click',togglePause);
document.getElementById('btn-rst').addEventListener('click',restartK);
document.getElementById('btn-exit').addEventListener('click',function(){stopTimer();show('idle');});
document.getElementById('prog-track').addEventListener('click',seekFromEvent);
document.getElementById('prog-track').addEventListener('touchend',function(e){e.preventDefault();seekFromEvent(e.changedTouches[0]);});
function seekFromEvent(e){if(!lyrics.length)return;var r=document.getElementById('prog-track').getBoundingClientRect();seekK(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*totalMs());}

function startListen(){
  setMsg('idle-msg','');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setMsg('idle-msg','⚠️ Usa Safari (iOS) o Chrome (Android).');return;}
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
    .then(function(stream){
      chunks=[];
      var opts={};
      if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))opts.mimeType='audio/webm;codecs=opus';
      else if(MediaRecorder.isTypeSupported('audio/webm'))opts.mimeType='audio/webm';
      else if(MediaRecorder.isTypeSupported('audio/mp4'))opts.mimeType='audio/mp4';
      mediaRec=new MediaRecorder(stream,opts);
      mediaRec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
      mediaRec.start(500);
      show('listening');
      startCountdown(8,function(){recognizeAudio(stream);});
    })
    .catch(function(err){
      var txt='⚠️ No se pudo acceder al micrófono.';
      if(err.name==='NotAllowedError')txt='⚠️ Permiso denegado. Ve a Ajustes > Safari > Micrófono.';
      setMsg('idle-msg',txt);
    });
}
function startCountdown(secs,cb){
  var r=secs;document.getElementById('listen-countdown').textContent=r;
  cntTmr=setInterval(function(){r--;document.getElementById('listen-countdown').textContent=r;if(r<=0){clearInterval(cntTmr);cb();}},1000);
}
function cancelListen(){
  clearInterval(cntTmr);
  try{if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();}catch(e){}
  try{if(mediaRec&&mediaRec.stream)mediaRec.stream.getTracks().forEach(function(t){t.stop();});}catch(e){}
}
function recognizeAudio(stream){
  try{if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();}catch(e){}
  stream.getTracks().forEach(function(t){t.stop();});
  setMsg('listen-msg','Identificando canción…','info');
  var mimeType=(mediaRec&&mediaRec.mimeType)?mediaRec.mimeType:'audio/webm';
  var blob=new Blob(chunks,{type:mimeType});
  if(blob.size<1000){setMsg('listen-msg','⚠️ No se captó audio.');setTimeout(function(){show('idle');},3000);return;}
  var form=new FormData();
  form.append('file',blob,'rec.'+(mimeType.includes('mp4')?'m4a':'webm'));
  form.append('return','spotify,apple_music');
  form.append('api_token','test');
  fetch('https://api.audd.io/',{method:'POST',body:form})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.status==='success'&&data.result){
        song={title:data.result.title,artist:data.result.artist};
        showFoundAndLoad(song.title,song.artist,null);
      }else{
        setMsg('listen-msg','No reconocida. Busca manualmente.','msg');
        setTimeout(function(){show('idle');},3000);
      }
    })
    .catch(function(){setMsg('listen-msg','⚠️ Error de red.','msg');setTimeout(function(){show('idle');},3000);});
}

// Quitar paréntesis, corchetes y sufijos tipo "- Live", "- Remaster"
function cleanTitle(t){
  return (t||'').replace(/\s*[\(\[].*?[\)\]]/g,'').replace(/\s*[-–]\s*(live|acoustic|remaster|version|versión|remix|radio edit|single|demo|maqueta).*/i,'').trim();
}

// Puntuar un resultado — menor es mejor
function scoreItem(item, qn){
  var tn = norm(cleanTitle(item.trackName||''));
  var score = 0;
  // Penalizar versiones secundarias en el título original
  var raw = norm(item.trackName||'');
  if(/\(|\[|-\s*(live|acoustic|remaster|versión|version|remix|maqueta|ikea)/i.test(item.trackName||'')) score += 10;
  // Premiar coincidencia exacta con la query
  if(tn === qn) score -= 5;
  // Premiar si tiene letra sincronizada
  if(item.syncedLyrics) score -= 3;
  return score;
}

function manualSearch(){
  var val=document.getElementById('manual-input').value.trim();
  if(!val){setMsg('idle-msg','Escribe algo para buscar.');return;}
  if(selectedLrcId){setMsg('idle-msg','');showFoundAndLoad(song.title,song.artist,selectedLrcId);return;}
  setMsg('idle-msg','Buscando…','info');
  document.getElementById('results-list').style.display='none';

  fetch('https://lrclib.net/api/search?q='+encodeURIComponent(val),{headers:{'Lrclib-Client':'KaraokeApp/1.0'}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(arr){
      if(!arr||arr.length===0){setMsg('idle-msg','No encontrado. Prueba con el título exacto.');return;}
      setMsg('idle-msg','');
      var qn=norm(cleanTitle(val));

      // Agrupar por título+artista limpios y quedarse con el mejor de cada grupo
      var groups={};
      arr.forEach(function(item){
        var key=norm(cleanTitle(item.trackName||''))+'||'+norm(item.artistName||'');
        if(!groups[key]||scoreItem(item,qn)<scoreItem(groups[key],qn)){
          groups[key]=item;
        }
      });
      var deduped=Object.values(groups);

      // Ordenar por score
      deduped.sort(function(a,b){return scoreItem(a,qn)-scoreItem(b,qn);});

      // Si el mejor resultado coincide claramente, elegirlo solo
      var best=deduped[0];
      var bestTitle=norm(cleanTitle(best.trackName||''));
      if(bestTitle===qn || deduped.length===1){
        selectResult(best);
      } else {
        // Mostrar máximo 4 opciones deduplicadas
        showResults(deduped.slice(0,4));
      }
    })
    .catch(function(){setMsg('idle-msg','⚠️ Error de red.');});
}

function showResults(arr){
  var list=document.getElementById('results-list');
  list.innerHTML='';
  arr.forEach(function(item){
    var div=document.createElement('div');div.className='result-item';
    var t=document.createElement('div');t.className='result-title';t.textContent=item.trackName||'—';
    var a=document.createElement('div');a.className='result-artist';a.textContent=item.artistName||'';
    div.appendChild(t);div.appendChild(a);
    div.addEventListener('click',function(){selectResult(item);});
    list.appendChild(div);
  });
  list.style.display='block';
}
function selectResult(item){
  selectedLrcId=item.id;
  song={title:item.trackName||'Desconocido',artist:item.artistName||''};
  document.getElementById('results-list').style.display='none';
  setMsg('idle-msg','');
  showFoundAndLoad(song.title,song.artist,item.id);
}

function showFoundAndLoad(title,artist,lrcId){
  document.getElementById('found-title').textContent=title;
  document.getElementById('found-artist').textContent=artist||'';
  document.getElementById('loading-lyrics').style.display='flex';
  document.getElementById('found-btns').style.display='none';
  setMsg('found-msg','');
  show('found');
  fetchLyrics(lrcId)
    .then(function(result){
      document.getElementById('loading-lyrics').style.display='none';
      if(!result||result.length===0){
        setMsg('found-msg','⚠️ No se encontró letra. Prueba escribiendo el título exacto.');
        document.getElementById('found-btns').style.display='flex';
        return;
      }
      lyrics=result;
      beginKaraoke();
    })
    .catch(function(){
      document.getElementById('loading-lyrics').style.display='none';
      setMsg('found-msg','⚠️ Error de red.');
      document.getElementById('found-btns').style.display='flex';
    });
}

function fetchLyrics(lrcId){
  if(lrcId){
    return fetch('https://lrclib.net/api/get/'+lrcId,{headers:{'Lrclib-Client':'KaraokeApp/1.0'}})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(d){
        if(d&&d.syncedLyrics)return parseLRC(d.syncedLyrics);
        if(d&&d.plainLyrics)return buildPlain(d.plainLyrics);
        return null;
      });
  }
  var url1='https://lrclib.net/api/get?track_name='+encodeURIComponent(song.title)+(song.artist?'&artist_name='+encodeURIComponent(song.artist):'');
  var url2='https://lrclib.net/api/search?q='+encodeURIComponent(song.title+' '+song.artist);
  function tryGet(url){return fetch(url,{headers:{'Lrclib-Client':'KaraokeApp/1.0'}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}
  return tryGet(url1).then(function(d){
    if(d&&!d.error){if(d.syncedLyrics)return parseLRC(d.syncedLyrics);if(d.plainLyrics)return buildPlain(d.plainLyrics);}
    return tryGet(url2).then(function(arr){
      if(!arr||!Array.isArray(arr))return null;
      for(var i=0;i<arr.length;i++){if(arr[i].syncedLyrics)return parseLRC(arr[i].syncedLyrics);}
      for(var j=0;j<arr.length;j++){if(arr[j].plainLyrics)return buildPlain(arr[j].plainLyrics);}
      return null;
    });
  });
}
function parseLRC(lrc){
  var result=[];
  lrc.split('\n').forEach(function(line){
    var m=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if(m){var ms=(parseInt(m[1])*60+parseFloat(m[2]))*1000;var text=m[3].trim();if(text)result.push({time:ms,text:text});}
  });
  return result;
}
function buildPlain(plain){
  var lines=plain.split('\n').filter(function(l){return l.trim();});
  var dur=lines.length*3600;
  return lines.map(function(text,i){return{time:i*(dur/lines.length),text:text};});
}

function beginKaraoke(){
  if(!lyrics.length)return;
  document.getElementById('k-title').textContent=song.title;
  document.getElementById('k-artist').textContent=song.artist||'';
  buildDOM();
  show('karaoke');
  autoScrollEnabled=true;
  kStart=performance.now();pausedAt=0;paused=false;
  document.getElementById('btn-pp').textContent='⏸';
  stopTimer();
  kTimer=setInterval(tick,80);
}
function buildDOM(){
  var c=document.getElementById('lyrics-box');
  c.innerHTML='';
  lyrics.forEach(function(line){
    var el=document.createElement('div');el.className='ll';el.textContent=line.text;
    var t=line.time;
    el.addEventListener('click',function(){autoScrollEnabled=true;seekK(t);});
    c.appendChild(el);
  });
}
function tick(){if(paused)return;updateAt(performance.now()-kStart);}
function updateAt(ms){
  var lines=document.querySelectorAll('.ll');
  var active=-1;
  for(var i=lyrics.length-1;i>=0;i--){if(ms>=lyrics[i].time){active=i;break;}}
  lines.forEach(function(el,i){
    el.classList.remove('active','past','next');
    if(i<active)el.classList.add('past');
    else if(i===active)el.classList.add('active');
    else if(i===active+1)el.classList.add('next');
  });
  if(autoScrollEnabled&&active>=0&&lines[active]){
    var win=document.getElementById('lyrics-win');
    var lel=lines[active];
    var target=lel.offsetTop-(win.clientHeight/2)+(lel.offsetHeight/2);
    win.scrollTo({top:Math.max(0,target),behavior:'smooth'});
  }
  var total=totalMs();
  document.getElementById('prog-fill').style.width=Math.min(100,(ms/total)*100)+'%';
  document.getElementById('t-cur').textContent=fmt(ms);
  document.getElementById('t-tot').textContent=fmt(total);
}
function totalMs(){return lyrics.length?lyrics[lyrics.length-1].time+5000:1;}
function fmt(ms){var s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function stopTimer(){if(kTimer){clearInterval(kTimer);kTimer=null;}}
function togglePause(){
  if(paused){kStart=performance.now()-pausedAt;paused=false;document.getElementById('btn-pp').textContent='⏸';}
  else{pausedAt=performance.now()-kStart;paused=true;document.getElementById('btn-pp').textContent='▶';}
}
function restartK(){
  autoScrollEnabled=true;
  kStart=performance.now();pausedAt=0;paused=false;
  document.getElementById('btn-pp').textContent='⏸';
  document.getElementById('lyrics-win').scrollTo({top:0,behavior:'smooth'});
  updateAt(0);
}
function seekK(ms){kStart=performance.now()-ms;pausedAt=ms;updateAt(ms);}
</script>
</body>
</html>
